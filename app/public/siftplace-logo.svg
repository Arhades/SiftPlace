<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" shape-rendering="crispEdges" role="img" aria-label="SiftPlace pixel house mascot">
  <!-- vector recreation of siftplace_logo.jpg (the blue "eureka" house) -->
  <!-- ground shadow -->
  <ellipse cx="96" cy="181" rx="44" ry="6" fill="#ccd0dc"/>

  <!-- chimney (behind the roof, right) -->
  <rect x="118" y="64" width="16" height="40" fill="#272b63"/>
  <rect x="121" y="67" width="10" height="34" fill="#5560e8"/>

  <!-- roof -->
  <polygon points="96,50 36,112 156,112" fill="#272b63"/>
  <polygon points="96,58 48,106 96,106" fill="#8d97f0"/>
  <polygon points="96,58 96,106 144,106" fill="#4a51c8"/>
  <!-- eaves bar -->
  <rect x="52" y="104" width="88" height="12" fill="#272b63"/>

  <!-- lightbulb on the rooftop -->
  <rect x="86" y="42" width="20" height="16" fill="#272b63"/>
  <rect x="89" y="45" width="14" height="10" fill="#8e95aa"/>
  <rect x="58" y="23" width="12" height="6" fill="#f2c94c"/>
  <rect x="122" y="23" width="12" height="6" fill="#f2c94c"/>
  <circle cx="96" cy="26" r="20" fill="#272b63"/>
  <circle cx="96" cy="26" r="16" fill="#f7d84e"/>
  <rect x="98" y="14" width="8" height="8" fill="#fbf0a9"/>

  <!-- walls -->
  <rect x="60" y="112" width="72" height="62" fill="#272b63"/>
  <rect x="64" y="116" width="64" height="54" fill="#5560e8"/>
  <rect x="64" y="116" width="64" height="5" fill="#dfe3fb"/>
  <rect x="64" y="121" width="9" height="39" fill="#99a3f4"/>
  <!-- plinth -->
  <rect x="64" y="160" width="64" height="10" fill="#272b63"/>

  <!-- windows (lit) -->
  <rect x="68" y="120" width="24" height="24" fill="#272b63"/>
  <rect x="71" y="123" width="18" height="18" fill="#f8d264"/>
  <rect x="71" y="123" width="8" height="8" fill="#fdf6e0"/>
  <rect x="79" y="123" width="2" height="18" fill="#272b63"/>
  <rect x="71" y="131" width="18" height="2" fill="#272b63"/>
  <rect x="100" y="120" width="24" height="24" fill="#272b63"/>
  <rect x="103" y="123" width="18" height="18" fill="#f8d264"/>
  <rect x="103" y="123" width="8" height="8" fill="#fdf6e0"/>
  <rect x="111" y="123" width="2" height="18" fill="#272b63"/>
  <rect x="103" y="131" width="18" height="2" fill="#272b63"/>

  <!-- door -->
  <rect x="84" y="144" width="24" height="26" fill="#272b63"/>
  <rect x="100" y="156" width="4" height="5" fill="#f8d264"/>

  <!-- left arm — raised "eureka" finger -->
  <rect x="44" y="116" width="24" height="14" fill="#272b63"/>
  <rect x="44" y="84" width="14" height="38" fill="#272b63"/>
  <rect x="42" y="70" width="22" height="17" fill="#272b63"/>
  <rect x="48" y="46" width="13" height="27" fill="#272b63"/>
  <rect x="47" y="119" width="18" height="8" fill="#5560e8"/>
  <rect x="47" y="87" width="8" height="33" fill="#5560e8"/>
  <rect x="45" y="73" width="16" height="11" fill="#5560e8"/>
  <rect x="51" y="49" width="7" height="21" fill="#5560e8"/>

  <!-- right arm resting on a moving box -->
  <rect x="124" y="126" width="22" height="14" fill="#272b63"/>
  <rect x="136" y="126" width="14" height="32" fill="#272b63"/>
  <rect x="127" y="129" width="16" height="8" fill="#5560e8"/>
  <rect x="139" y="129" width="8" height="26" fill="#5560e8"/>
  <rect x="124" y="150" width="28" height="26" fill="#272b63"/>
  <rect x="127" y="153" width="22" height="20" fill="#4a51c8"/>
</svg>
